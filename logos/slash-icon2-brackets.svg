<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Code brackets < / > as abstract mark -->
  <g fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left bracket < -->
    <polyline points="60,55 30,100 60,145" />
    <!-- Slash / (center, prominent) -->
    <line x1="118" y1="40" x2="82" y2="160" stroke-width="10" />
    <!-- Right bracket > -->
    <polyline points="140,55 170,100 140,145" />
  </g>
</svg>